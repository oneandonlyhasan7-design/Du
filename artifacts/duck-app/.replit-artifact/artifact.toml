kind = "web"
previewPath = "/"
title = "Duck App"
version = "1.0.0"
id = "artifacts/duck-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21308

[services.development]
run = "pnpm --filter @workspace/duck-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/duck-app", "run", "build" ]
publicDir = "artifacts/duck-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21308"
BASE_PATH = "/"
